<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520"><rect width="800" height="520" fill="#020617"/><text x="40" y="45" fill="#38bdf8" font-size="30" font-family="Inter,Arial">Agent GPU Runtime Workflow</text><rect x="40" y="80" width="720" height="70" rx="16" fill="#111827" stroke="#38bdf8"/><text x="64" y="123" fill="#f8fafc" font-size="22">1. Local agent receives training/eval job</text><rect x="40" y="175" width="720" height="70" rx="16" fill="#111827" stroke="#38bdf8"/><text x="64" y="218" fill="#f8fafc" font-size="22">2. CLI provisions Colab GPU runtime</text><rect x="40" y="270" width="720" height="70" rx="16" fill="#111827" stroke="#38bdf8"/><text x="64" y="313" fill="#f8fafc" font-size="22">3. Remote script executes with captured logs</text><rect x="40" y="365" width="720" height="70" rx="16" fill="#111827" stroke="#38bdf8"/><text x="64" y="408" fill="#f8fafc" font-size="22">4. Artifacts download back into repo/vault</text><rect x="40" y="460" width="720" height="70" rx="16" fill="#111827" stroke="#38bdf8"/><text x="64" y="503" fill="#f8fafc" font-size="22">5. Runtime is stopped and decision is recorded</text></svg>
